name: Update Activity

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            README.md
          sparse-checkout-cone-mode: false
      
      - name: Fetch Activity
        run: |
          ACTIVITY=$(curl -s "https://api.github.com/users/iyow/events/public?per_page=5" | \
            jq -r '.[] | select(.type == "PushEvent" or .type == "CreateEvent" or .type == "IssuesEvent" or .type == "PullRequestEvent") | \
            "• \(.created_at[0:10])  \(.type | gsub("Event"; "")) on \(.repo.name)"' | head -5)
          
          if [ -n "$ACTIVITY" ]; then
            sed -i '/<!-- START_ACTIVITY -->/,/<!-- END_ACTIVITY -->/c\<!-- START_ACTIVITY -->\n'"$ACTIVITY"'\n<!-- END_ACTIVITY -->' README.md
          fi
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --exit-code --quiet; then
            git commit -m "📰 Auto-update recent activity"
            git push
          fi
