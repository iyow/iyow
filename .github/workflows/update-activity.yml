name: Update Activity

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            README.md
          sparse-checkout-cone-mode: false
      
      - name: Fetch Activity
        run: |
          curl -s "https://api.github.com/users/iyow/events/public?per_page=5" > /tmp/events.json
          
          python3 << 'EOF'
import re
import json

with open('README.md', 'r') as f:
    content = f.read()
    
with open('/tmp/events.json') as f:
    events = json.load(f)
    
activities = []
for e in events:
    if e['type'] == 'PushEvent':
        date = e['created_at'][:10]
        repo = e['repo']['name']
        activities.append(f"📅 {date} · Pushed to **{repo}**")
        if len(activities) >= 5:
            break

if activities:
    new_section = "\n".join(activities)
    content = re.sub(r'<p align="left" style="background-color: #f6f8fa; padding: 12px; border-radius: 6px; border: 1px solid #d0d7de;">.*?</p>', f'<p align="left" style="background-color: #f6f8fa; padding: 12px; border-radius: 6px; border: 1px solid #d0d7de;">\n\n{new_section}\n\n</p>', content, flags=re.DOTALL)
    with open('README.md', 'w') as f:
        f.write(content)
EOF
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --exit-code --quiet; then
            git commit -m "📰 Auto-update recent activity"
            git push
          fi
