name: Update Activity

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            README.md
          sparse-checkout-cone-mode: false
      
      - name: Fetch Activity
        run: |
          curl -s "https://api.github.com/users/iyow/events/public?per_page=5" > /tmp/events.json
          ACTIVITY=$(jq -r '.[] | select(.type == "PushEvent") | "• \(.created_at[0:10]) Pushed to \(.repo.name)"' /tmp/events.json | head -5 || true)
          
          if [ -n "$ACTIVITY" ]; then
            python3 << 'EOF'
import re
with open('README.md', 'r') as f:
            content = f.read()
            
with open('/tmp/events.json') as f:
            import json
            events = json.load(f)
            
activities = []
for e in events:
              if e['type'] == 'PushEvent':
                date = e['created_at'][:10]
                repo = e['repo']['name']
                activities.append(f"• {date} Pushed to {repo}")
                if len(activities) >= 5:
                  break
            
if activities:
              new_section = "<!-- START_ACTIVITY -->\n" + "\n".join(activities) + "\n<!-- END_ACTIVITY -->"
              content = re.sub(r'<!-- START_ACTIVITY -->.*?<!-- END_ACTIVITY -->', new_section, content, flags=re.DOTALL)
              with open('README.md', 'w') as f:
                f.write(content)
EOF
          fi
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --exit-code --quiet; then
            git commit -m "📰 Auto-update recent activity"
            git push
          fi
