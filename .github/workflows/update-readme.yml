name: Update README

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update timestamp
        run: |
          UPDATE_TIME=$(date '+%Y-%m-%d %H:%M')
          sed -i "s/<!-- UPDATE_TIME -->/$UPDATE_TIME/" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --exit-code || git commit -m "🔄 Auto-update: $UPDATE_TIME"
          git push
